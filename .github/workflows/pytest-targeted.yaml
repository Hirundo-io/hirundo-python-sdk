name: Run targeted tests (manual)

on:
  workflow_dispatch:
    inputs:
      tests:
        description: "Space-separated pytest node IDs to run"
        required: true
        default: "tests/unlearning-llm/unlearn_llm_behavior_test.py tests/speech-to-text/sanity_stt_git_test.py"

jobs:
  pytest_targeted:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv sync --group dev
      - name: Run targeted tests
        run: .venv/bin/pytest ${{ github.event.inputs.tests }} -v -s
        env:
          API_HOST: ${{ secrets.API_HOST2 }}
          API_KEY: ${{ secrets.API_KEY2 }}
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          HUGGINGFACE_ACCESS_TOKEN: ${{ secrets.HUGGINGFACE_ACCESS_TOKEN }}
          UNIQUE_ID: "manual-${{ github.run_number }}"
          FULL_TEST: "true"
